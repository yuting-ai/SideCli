<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #1e1e1e;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #terminal-container {
            flex: 1;
            width: 100%;
            height: 100%;
            padding: 4px;
        }

        #terminal-status {
            display: none;
            padding: 16px;
            color: #f48771;
            font: 13px Menlo, Monaco, "Courier New", monospace;
            white-space: pre-wrap;
        }

        body.is-error #terminal-container {
            display: none;
        }

        body.is-error #terminal-status {
            display: block;
        }

/* Push the hidden xterm textarea to the top-left corner so the
   macOS IME composition popup does not overlay terminal text. */
.xterm-helper-textarea {
    top: 0 !important;
    left: 0 !important;
}

    </style>
    <!-- xterm.js 本地资源 -->
    <link rel="stylesheet" href="xterm.css" />
    <script src="xterm.min.js"></script>
    <script src="xterm-addon-fit.min.js"></script>
    <script src="xterm-addon-web-links.min.js"></script>
    <script src="xterm-addon-unicode11.min.js"></script>
</head>
<body>
    <div id="terminal-container"></div>
    <div id="terminal-status"></div>

    <script>
        (function() {
            'use strict';

            const container = document.getElementById('terminal-container');
            const status = document.getElementById('terminal-status');
            let term = null;
            let fitAddon = null;
            let isInitialized = false;
            let pendingData = [];
            const controlKeyMap = {
                a: '\u0001',
                b: '\u0002',
                c: '\u0003',
                d: '\u0004',
                e: '\u0005',
                f: '\u0006',
                g: '\u0007',
                h: '\u0008',
                i: '\u0009',
                j: '\u000a',
                k: '\u000b',
                l: '\u000c',
                m: '\u000d',
                n: '\u000e',
                o: '\u000f',
                p: '\u0010',
                q: '\u0011',
                r: '\u0012',
                s: '\u0013',
                t: '\u0014',
                u: '\u0015',
                v: '\u0016',
                w: '\u0017',
                x: '\u0018',
                y: '\u0019',
                z: '\u001a',
                '[': '\u001b',
                '\\': '\u001c',
                ']': '\u001d',
                '^': '\u001e',
                '_': '\u001f',
                ' ': '\u0000',
                '@': '\u0000'
            };

            function showError(message) {
                document.body.classList.add('is-error');
                status.textContent = message;
            }

            // 初始化终端
            function initTerminal() {
                if (isInitialized) return;

                try {
                    if (!window.Terminal || !window.FitAddon || !window.WebLinksAddon) {
                        throw new Error('xterm.js resources failed to load');
                    }

term = new Terminal({
        fontSize: 14,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        allowProposedApi: true,
        theme: {
          background: '#1e1e1e',
          foreground: '#d4d4d4',
          cursor: '#d4d4d4',
          selectionBackground: '#264f78',
          black: '#000000',
          red: '#cd3131',
          green: '#0dbc79',
          yellow: '#e5e510',
          blue: '#2472c8',
          magenta: '#bc3fbc',
          cyan: '#11a8cd',
          white: '#e5e5e5',
          brightBlack: '#666666',
          brightRed: '#f14c4c',
          brightGreen: '#23d18b',
          brightYellow: '#f5f543',
          brightBlue: '#3b8eea',
          brightMagenta: '#d670d6',
          brightCyan: '#29b8db',
          brightWhite: '#e5e5e5'
        },
        cursorBlink: true,
        cursorStyle: 'block',
        scrollback: 10000
      });

                    // 添加插件
                    fitAddon = new FitAddon.FitAddon();
                    term.loadAddon(fitAddon);
                    term.loadAddon(new WebLinksAddon.WebLinksAddon());
                    if (window.Unicode11Addon) {
                        term.loadAddon(new Unicode11Addon.Unicode11Addon());
                        term.unicode.activeVersion = '11';
                    }

                    // 打开终端
                    term.open(container);
                    fitAddon.fit();

                    // 处理输入
                    term.onData(function(data) {
                        window.webkit.messageHandlers.terminalInput.postMessage({
                            terminalId: getTerminalId(),
                            data: data
                        });
                    });

                    // Force common Ctrl-based terminal shortcuts to emit control bytes.
                    // This keeps behavior consistent in WKWebView (e.g. Ctrl+C -> SIGINT).
                    term.attachCustomKeyEventHandler(function(event) {
                        if (event.type !== 'keydown') {
                            return true;
                        }

                        if (event.metaKey && !event.ctrlKey && !event.altKey) {
                            const metaKey = (event.key || '').toLowerCase();

                            if (metaKey === 'c') {
                                const selection = term.getSelection();
                                if (selection && selection.length > 0) {
                                    window.webkit.messageHandlers.terminalCopy.postMessage({
                                        terminalId: getTerminalId(),
                                        text: selection
                                    });
                                }
                                event.preventDefault();
                                return false;
                            }

                            if (metaKey === 'v') {
                                window.webkit.messageHandlers.terminalPaste.postMessage({
                                    terminalId: getTerminalId()
                                });
                                event.preventDefault();
                                return false;
                            }

                            if (metaKey === 'k') {
                                term.clear();
                                event.preventDefault();
                                return false;
                            }

                            if (metaKey === 'a') {
                                term.selectAll();
                                event.preventDefault();
                                return false;
                            }
                        }

                        if (!event.ctrlKey || event.metaKey || event.altKey) {
                            return true;
                        }

                        const key = (event.key || '').toLowerCase();
                        const controlChar = controlKeyMap[key];
                        if (!controlChar) {
                            return true;
                        }

                        window.webkit.messageHandlers.terminalInput.postMessage({
                            terminalId: getTerminalId(),
                            data: controlChar
                        });
                        event.preventDefault();
                        return false;
                    });

                    // 处理终端大小变化
                    term.onResize(function(size) {
                        window.webkit.messageHandlers.terminalResize.postMessage({
                            terminalId: getTerminalId(),
                            cols: size.cols,
                            rows: size.rows
                        });
                    });

                    // 窗口大小变化时重新适配
                    // 优先用 ResizeObserver 直接监听容器元素，比 window.resize 更可靠
                    var _fitTimer = null;
                    function scheduleFit() {
                        if (_fitTimer) clearTimeout(_fitTimer);
                        _fitTimer = setTimeout(function() {
                            _fitTimer = null;
                            if (fitAddon) fitAddon.fit();
                        }, 50);
                    }

                    if (window.ResizeObserver) {
                        new ResizeObserver(scheduleFit).observe(container);
                    } else {
                        window.addEventListener('resize', scheduleFit);
                    }

                    isInitialized = true;

                    // 发送初始化完成消息
                    window.webkit.messageHandlers.terminalReady.postMessage({
                        terminalId: getTerminalId(),
                        cols: term.cols,
                        rows: term.rows
                    });

                    // 处理挂起的数据
                    while (pendingData.length > 0) {
                        const data = pendingData.shift();
                        term.write(data);
                    }

                } catch (error) {
                    console.error('Terminal initialization error:', error);
                    showError('Terminal failed to initialize.\n' + error.toString());
                    window.webkit.messageHandlers.terminalError.postMessage({
                        terminalId: getTerminalId(),
                        error: error.toString()
                    });
                }
            }

            // 获取终端ID
            function getTerminalId() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id') || 'default';
            }

            // 写入数据到终端
            window.writeToTerminal = function(data) {
                if (term) {
                    term.write(data);
                } else {
                    pendingData.push(data);
                }
            };

            // 粘贴文本到终端输入（由原生层读取系统剪贴板后调用）
            window.pasteToTerminal = function(base64Text) {
                if (!term || !base64Text) return;
                const raw = atob(base64Text);
                const bytes = new Uint8Array(raw.length);
                for (let i = 0; i < raw.length; i++) {
                    bytes[i] = raw.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                term.paste(decoder.decode(bytes));
            };

            // 清除终端
            window.clearTerminal = function() {
                if (term) {
                    term.clear();
                }
            };

            // 聚焦终端
            window.focusTerminal = function() {
                if (term) {
                    term.focus();
                }
            };

            // 调整终端大小
            window.resizeTerminal = function() {
                if (fitAddon) {
                    fitAddon.fit();
                }
            };

            // 设置字体大小
            window.setFontSize = function(size) {
                if (term) {
                    term.options.fontSize = size;
                    if (fitAddon) fitAddon.fit();
                }
            };

            // 切换主题
            window.setTheme = function(isDark) {
                if (!term) return;
                if (isDark) {
                    document.body.style.backgroundColor = '#1e1e1e';
                    document.getElementById('terminal-container').style.backgroundColor = '#1e1e1e';
                    term.options.theme = {
                        background: '#1e1e1e', foreground: '#d4d4d4',
                        cursor: '#d4d4d4', selectionBackground: '#264f78',
                        black: '#000000', red: '#cd3131', green: '#0dbc79',
                        yellow: '#e5e510', blue: '#2472c8', magenta: '#bc3fbc',
                        cyan: '#11a8cd', white: '#e5e5e5',
                        brightBlack: '#666666', brightRed: '#f14c4c',
                        brightGreen: '#23d18b', brightYellow: '#f5f543',
                        brightBlue: '#3b8eea', brightMagenta: '#d670d6',
                        brightCyan: '#29b8db', brightWhite: '#e5e5e5'
                    };
                } else {
                    document.body.style.backgroundColor = '#ffffff';
                    document.getElementById('terminal-container').style.backgroundColor = '#ffffff';
                    term.options.theme = {
                        background: '#ffffff', foreground: '#1e1e1e',
                        cursor: '#1e1e1e', selectionBackground: '#add6ff',
                        black: '#000000', red: '#cd3131', green: '#00742d',
                        yellow: '#795e26', blue: '#0451a5', magenta: '#7b0c9e',
                        cyan: '#007878', white: '#555555',
                        brightBlack: '#888888', brightRed: '#e51400',
                        brightGreen: '#14ce14', brightYellow: '#b5ba00',
                        brightBlue: '#0000ff', brightMagenta: '#b800d8',
                        brightCyan: '#00b5a9', brightWhite: '#a5a5a5'
                    };
                }
            };

            // 获取终端尺寸
            window.getTerminalSize = function() {
                if (term) {
                    return {
                        cols: term.cols,
                        rows: term.rows
                    };
                }
                return null;
            };

            // DOM 加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTerminal);
            } else {
                initTerminal();
            }
        })();
    </script>
</body>
</html>
